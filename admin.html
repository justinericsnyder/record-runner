<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Runner — Admin Dashboard</title>
  <link rel="stylesheet" href="/src/admin/admin.css" />
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h1>🎵 Record Runner</h1>
      <h2>Admin Dashboard</h2>
      <form id="login-form">
        <input type="text" id="login-user" placeholder="Username" autocomplete="username" />
        <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" />
        <button type="submit">Sign In</button>
        <p id="login-error" class="error"></p>
      </form>
    </div>
  </div>
  <div id="dashboard" class="hidden">
    <header>
      <div class="header-left">
        <h1>🎵 Level Builder</h1>
        <span class="badge">Admin</span>
      </div>
      <div class="header-right">
        <span id="user-display"></span>
        <button id="logout-btn" class="btn-sm">Logout</button>
      </div>
    </header>
    <main>
      <aside id="sidebar">
        <section class="panel">
          <h3>AI Generator</h3>
          <label>Seed <input type="number" id="ai-seed" value="42" min="1" /></label>
          <label>Difficulty
            <select id="ai-difficulty">
              <option value="0">Easy</option>
              <option value="1" selected>Medium</option>
              <option value="1.5">Hard</option>
              <option value="2">Expert</option>
            </select>
          </label>
          <label>Platforms <input type="range" id="ai-platforms" min="10" max="35" value="18" /><span id="ai-plat-val">18</span></label>
          <label>Hazard Density <input type="range" id="ai-hazards" min="0" max="100" value="25" /><span id="ai-haz-val">25%</span></label>
          <label>Power-ups <input type="range" id="ai-powerups" min="0" max="8" value="4" /><span id="ai-pu-val">4</span></label>
          <label>Spiral Rotations <input type="range" id="ai-rotations" min="1" max="4" value="2" step="0.5" /><span id="ai-rot-val">2</span></label>
          <button id="ai-generate" class="btn-primary">🤖 Generate Level</button>
          <button id="ai-randomize" class="btn-secondary">🎲 Random Seed</button>
        </section>
        <section class="panel">
          <h3>Place Tool</h3>
          <div class="tool-grid">
            <button class="tool-btn active" data-tool="platform">▬ Platform</button>
            <button class="tool-btn" data-tool="collectible">♪ Note</button>
            <button class="tool-btn" data-tool="hazard">✕ Hazard</button>
            <button class="tool-btn" data-tool="powerup_stop">⏸ Freeze</button>
            <button class="tool-btn" data-tool="powerup_slow">⏪ Slow</button>
            <button class="tool-btn" data-tool="powerup_fast">⏩ Fast</button>
            <button class="tool-btn" data-tool="exit">◉ Exit</button>
            <button class="tool-btn" data-tool="start">⚑ Start</button>
          </div>
        </section>
        <section class="panel">
          <h3>Level Info</h3>
          <div id="level-stats"></div>
        </section>
        <section class="panel">
          <h3>Actions</h3>
          <button id="btn-clear" class="btn-danger">🗑 Clear All</button>
          <button id="btn-validate" class="btn-secondary">✓ Validate</button>
          <button id="btn-export" class="btn-primary">📋 Export JSON</button>
        </section>
      </aside>
      <div id="canvas-area">
        <canvas id="editor-canvas" width="800" height="800"></canvas>
        <div id="toast" class="hidden"></div>
      </div>
      <aside id="inspector" class="hidden">
        <h3>Inspector</h3>
        <div id="inspector-content"></div>
      </aside>
    </main>
  </div>
  <script type="module" src="/src/admin/admin.js"></script>
</body>
</html>
