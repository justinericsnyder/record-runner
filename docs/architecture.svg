<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="550" y="35" fill="#e94560" font-size="20" font-weight="bold" text-anchor="middle">Record Runner — Technical Architecture</text>

  <!-- Browser Client Box -->
  <rect x="30" y="55" width="1040" height="540" fill="none" stroke="#333355" stroke-width="2" rx="8"/>
  <text x="50" y="75" fill="#666677" font-size="11">BROWSER CLIENT</text>

  <!-- Phaser Engine -->
  <rect x="50" y="90" width="320" height="180" fill="#222240" stroke="#44446a" stroke-width="1.5" rx="6"/>
  <text x="210" y="110" fill="#e94560" font-size="13" font-weight="bold" text-anchor="middle">Phaser 3 Engine</text>
  <rect x="65" y="120" width="90" height="40" fill="#333355" rx="4"/>
  <text x="110" y="144" fill="#aaaacc" font-size="10" text-anchor="middle">Arcade</text>
  <text x="110" y="155" fill="#aaaacc" font-size="10" text-anchor="middle">Physics</text>
  <rect x="165" y="120" width="90" height="40" fill="#333355" rx="4"/>
  <text x="210" y="144" fill="#aaaacc" font-size="10" text-anchor="middle">Scene</text>
  <text x="210" y="155" fill="#aaaacc" font-size="10" text-anchor="middle">Manager</text>
  <rect x="265" y="120" width="90" height="40" fill="#333355" rx="4"/>
  <text x="310" y="144" fill="#aaaacc" font-size="10" text-anchor="middle">Graphics</text>
  <text x="310" y="155" fill="#aaaacc" font-size="10" text-anchor="middle">API</text>
  <rect x="65" y="170" width="90" height="40" fill="#333355" rx="4"/>
  <text x="110" y="194" fill="#aaaacc" font-size="10" text-anchor="middle">Input</text>
  <text x="110" y="205" fill="#aaaacc" font-size="10" text-anchor="middle">System</text>
  <rect x="165" y="170" width="90" height="40" fill="#333355" rx="4"/>
  <text x="210" y="194" fill="#aaaacc" font-size="10" text-anchor="middle">Scale</text>
  <text x="210" y="205" fill="#aaaacc" font-size="10" text-anchor="middle">Manager</text>
  <rect x="265" y="170" width="90" height="40" fill="#333355" rx="4"/>
  <text x="310" y="194" fill="#aaaacc" font-size="10" text-anchor="middle">Tweens</text>
  <text x="310" y="205" fill="#aaaacc" font-size="10" text-anchor="middle">System</text>
  <text x="210" y="255" fill="#555566" font-size="9" text-anchor="middle">Gravity • Collisions • Rendering • Scaling</text>

  <!-- SpinScene (Core Gameplay) -->
  <rect x="400" y="90" width="310" height="180" fill="#2a1a2a" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="555" y="110" fill="#e94560" font-size="13" font-weight="bold" text-anchor="middle">SpinScene (Core Gameplay)</text>
  <text x="420" y="132" fill="#ccccdd" font-size="10">• Drag-to-rotate input</text>
  <text x="420" y="148" fill="#ccccdd" font-size="10">• Momentum + friction decay</text>
  <text x="420" y="164" fill="#ccccdd" font-size="10">• Velocity-based platform movement</text>
  <text x="420" y="180" fill="#ccccdd" font-size="10">• Rotated AABB collision boxes</text>
  <text x="420" y="196" fill="#ccccdd" font-size="10">• Slope traction (20% grade limit)</text>
  <text x="420" y="212" fill="#ccccdd" font-size="10">• Sub-stepped rotation (anti-tunnel)</text>
  <text x="420" y="228" fill="#ccccdd" font-size="10">• Power-ups / Springs / Arc walls</text>
  <text x="420" y="248" fill="#555566" font-size="9">8 scene types • Touch + keyboard input</text>

  <!-- Vite -->
  <rect x="740" y="90" width="150" height="60" fill="#222240" stroke="#44446a" stroke-width="1.5" rx="6"/>
  <text x="815" y="115" fill="#f5c518" font-size="13" font-weight="bold" text-anchor="middle">Vite 5</text>
  <text x="815" y="135" fill="#888899" font-size="10" text-anchor="middle">Build • HMR • Bundle</text>

