<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="monospace" font-size="12">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#1a1a2e" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" fill="#e94560" font-size="18" font-weight="bold" text-anchor="middle">Record Runner — Architecture Overview</text>

  <!-- Browser Client Box -->
  <rect x="30" y="55" width="840" height="380" fill="none" stroke="#333355" stroke-width="2" rx="8"/>
  <text x="50" y="75" fill="#666677" font-size="11">BROWSER CLIENT</text>

  <!-- Game Engine -->
  <rect x="50" y="90" width="250" height="100" fill="#222240" stroke="#44446a" stroke-width="1.5" rx="6"/>
  <text x="175" y="112" fill="#e94560" font-size="13" font-weight="bold" text-anchor="middle">Game Engine</text>
  <text x="175" y="132" fill="#aaaacc" font-size="10" text-anchor="middle">Physics • Scenes • Rendering</text>
  <text x="175" y="148" fill="#aaaacc" font-size="10" text-anchor="middle">Input • Scaling • Tweens</text>
  <text x="175" y="175" fill="#555566" font-size="9" text-anchor="middle">Phaser 3 (Arcade Physics)</text>

  <!-- Core Gameplay -->
  <rect x="330" y="90" width="250" height="100" fill="#2a1a2a" stroke="#e94560" stroke-width="1.5" rx="6"/>
  <text x="455" y="112" fill="#e94560" font-size="13" font-weight="bold" text-anchor="middle">Core Gameplay</text>
  <text x="345" y="132" fill="#ccccdd" font-size="10">Drag-to-rotate mechanics</text>
  <text x="345" y="148" fill="#ccccdd" font-size="10">Momentum + slope physics</text>
  <text x="345" y="164" fill="#ccccdd" font-size="10">Collision resolution</text>
  <text x="345" y="180" fill="#ccccdd" font-size="10">Power-ups / Springs / Walls</text>

  <!-- Build -->
  <rect x="610" y="90" width="120" height="100" fill="#222240" stroke="#44446a" stroke-width="1.5" rx="6"/>
  <text x="670" y="115" fill="#f5c518" font-size="12" font-weight="bold" text-anchor="middle">Build</text>
  <text x="670" y="135" fill="#888899" font-size="10" text-anchor="middle">Vite</text>
  <text x="670" y="155" fill="#888899" font-size="10" text-anchor="middle">Multi-page</text>
  <text x="670" y="175" fill="#888899" font-size="10" text-anchor="middle">Bundling</text>

  <!-- Mobile -->
  <rect x="760" y="90" width="100" height="100" fill="#222240" stroke="#44446a" stroke-width="1.5" rx="6"/>
  <text x="810" y="115" fill="#aaaacc" font-size="11" font-weight="bold" text-anchor="middle">Mobile</text>
  <text x="810" y="135" fill="#888899" font-size="9" text-anchor="middle">Responsive</text>
  <text x="810" y="150" fill="#888899" font-size="9" text-anchor="middle">Touch</text>
  <text x="810" y="165" fill="#888899" font-size="9" text-anchor="middle">Controls</text>

  <!-- Arrow engine to gameplay -->
  <line x1="300" y1="140" x2="330" y2="140" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Procedural Systems Row -->
  <rect x="50" y="210" width="190" height="90" fill="#1a2a1a" stroke="#44dd66" stroke-width="1.5" rx="6"/>
  <text x="145" y="232" fill="#44dd66" font-size="12" font-weight="bold" text-anchor="middle">Level Generator</text>
  <text x="60" y="252" fill="#ccccdd" font-size="10">Seeded procedural generation</text>
  <text x="60" y="268" fill="#ccccdd" font-size="10">Reachability guarantees</text>
  <text x="60" y="284" fill="#ccccdd" font-size="10">6 records • 34 tracks</text>

  <rect x="260" y="210" width="190" height="90" fill="#1a1a2a" stroke="#00ccff" stroke-width="1.5" rx="6"/>
  <text x="355" y="232" fill="#00ccff" font-size="12" font-weight="bold" text-anchor="middle">Music Engine</text>
  <text x="270" y="252" fill="#ccccdd" font-size="10">Web Audio synthesis</text>
  <text x="270" y="268" fill="#ccccdd" font-size="10">Name-driven scale selection</text>
  <text x="270" y="284" fill="#ccccdd" font-size="10">Bass • Melody • Perc • Pad</text>

  <rect x="470" y="210" width="190" height="90" fill="#2a2a1a" stroke="#f5c518" stroke-width="1.5" rx="6"/>
  <text x="565" y="232" fill="#f5c518" font-size="12" font-weight="bold" text-anchor="middle">Art Generator</text>
  <text x="480" y="252" fill="#ccccdd" font-size="10">Runtime texture creation</text>
  <text x="480" y="268" fill="#ccccdd" font-size="10">Cel-shaded style</text>
  <text x="480" y="284" fill="#ccccdd" font-size="10">Zero static image assets</text>

  <rect x="680" y="210" width="180" height="90" fill="#2a1a1a" stroke="#ff8800" stroke-width="1.5" rx="6"/>
  <text x="770" y="232" fill="#ff8800" font-size="12" font-weight="bold" text-anchor="middle">Score System</text>
  <text x="690" y="252" fill="#ccccdd" font-size="10">Client-side persistence</text>
  <text x="690" y="268" fill="#ccccdd" font-size="10">Input sanitization</text>
  <text x="690" y="284" fill="#ccccdd" font-size="10">Leaderboard</text>

  <!-- Admin -->
  <rect x="50" y="320" width="400" height="70" fill="#1a1a22" stroke="#888899" stroke-width="1.5" rx="6"/>
  <text x="250" y="342" fill="#888899" font-size="12" font-weight="bold" text-anchor="middle">Admin Dashboard</text>
  <text x="60" y="362" fill="#ccccdd" font-size="10">Visual level editor • AI-driven generation • Validation • Export</text>

  <!-- Social -->
  <rect x="470" y="320" width="180" height="70" fill="#1a1a22" stroke="#888899" stroke-width="1.5" rx="6"/>
  <text x="560" y="342" fill="#888899" font-size="12" font-weight="bold" text-anchor="middle">Social / SEO</text>
  <text x="480" y="362" fill="#ccccdd" font-size="10">OG tags • Favicon</text>

  <!-- Deployment -->
  <rect x="30" y="460" width="840" height="80" fill="none" stroke="#333355" stroke-width="2" rx="8"/>
  <text x="50" y="480" fill="#666677" font-size="11">DEPLOYMENT</text>

  <rect x="50" y="490" width="160" height="40" fill="#222240" stroke="#44446a" rx="4"/>
  <text x="130" y="514" fill="#aaaacc" font-size="11" text-anchor="middle">GitHub</text>

  <line x1="210" y1="510" x2="260" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="490" width="160" height="40" fill="#222240" stroke="#44446a" rx="4"/>
  <text x="340" y="514" fill="#aaaacc" font-size="11" text-anchor="middle">CI/CD Build</text>

  <line x1="420" y1="510" x2="470" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="470" y="490" width="160" height="40" fill="#222240" stroke="#44446a" rx="4"/>
  <text x="550" y="514" fill="#aaaacc" font-size="11" text-anchor="middle">CDN</text>

  <line x1="630" y1="510" x2="680" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="680" y="490" width="160" height="40" fill="#222240" stroke="#e94560" rx="4"/>
  <text x="760" y="514" fill="#e94560" font-size="11" text-anchor="middle">Players</text>

  <!-- Arrow client to deployment -->
  <line x1="450" y1="435" x2="450" y2="460" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="450" y="575" fill="#444455" font-size="10" text-anchor="middle">Zero static assets • Zero external APIs • Fully client-side</text>
  <text x="450" y="595" fill="#333344" font-size="9" text-anchor="middle">Phaser 3 • Vite • Web Audio API • Canvas • Vercel</text>
</svg>
