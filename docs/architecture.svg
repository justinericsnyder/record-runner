  <rect x="910" y="90" width="150" height="60" fill="#222240" stroke="#44446a" stroke-width="1.5" rx="6"/>
  <text x="985" y="115" fill="#aaaacc" font-size="11" font-weight="bold" text-anchor="middle">Multi-Page</text>
  <text x="985" y="132" fill="#888899" font-size="9" text-anchor="middle">index.html (game)</text>
  <text x="985" y="144" fill="#888899" font-size="9" text-anchor="middle">admin.html (editor)</text>

  <!-- Procedural Systems Row -->
  <rect x="50" y="290" width="220" height="120" fill="#1a2a1a" stroke="#44dd66" stroke-width="1.5" rx="6"/>
  <text x="160" y="310" fill="#44dd66" font-size="12" font-weight="bold" text-anchor="middle">Level Generator</text>
  <text x="65" y="330" fill="#ccccdd" font-size="10">mulberry32 seeded PRNG</text>
  <text x="65" y="346" fill="#ccccdd" font-size="10">Spiral platform placement</text>
  <text x="65" y="362" fill="#ccccdd" font-size="10">Reachability guarantees</text>
  <text x="65" y="378" fill="#ccccdd" font-size="10">4 platform styles</text>
  <text x="65" y="394" fill="#ccccdd" font-size="10">6 records • 34 tracks</text>

  <rect x="290" y="290" width="220" height="120" fill="#1a1a2a" stroke="#00ccff" stroke-width="1.5" rx="6"/>
  <text x="400" y="310" fill="#00ccff" font-size="12" font-weight="bold" text-anchor="middle">Music Engine</text>
  <text x="305" y="330" fill="#ccccdd" font-size="10">Web Audio API synthesis</text>
  <text x="305" y="346" fill="#ccccdd" font-size="10">50+ keyword → scale mapping</text>
  <text x="305" y="362" fill="#ccccdd" font-size="10">Bass • Melody • Percussion • Pad</text>
  <text x="305" y="378" fill="#ccccdd" font-size="10">11 musical scales</text>
  <text x="305" y="394" fill="#ccccdd" font-size="10">Mood-driven rhythm density</text>

  <rect x="530" y="290" width="220" height="120" fill="#2a2a1a" stroke="#f5c518" stroke-width="1.5" rx="6"/>
  <text x="640" y="310" fill="#f5c518" font-size="12" font-weight="bold" text-anchor="middle">Texture Generator</text>
  <text x="545" y="330" fill="#ccccdd" font-size="10">Phaser Graphics API</text>
  <text x="545" y="346" fill="#ccccdd" font-size="10">Cel-shaded style</text>
  <text x="545" y="362" fill="#ccccdd" font-size="10">Bold outlines + flat fills</text>
  <text x="545" y="378" fill="#ccccdd" font-size="10">Hard shadow/highlight bands</text>
  <text x="545" y="394" fill="#ccccdd" font-size="10">12 unique texture types</text>

  <rect x="770" y="290" width="220" height="120" fill="#2a1a1a" stroke="#ff8800" stroke-width="1.5" rx="6"/>
  <text x="880" y="310" fill="#ff8800" font-size="12" font-weight="bold" text-anchor="middle">Score System</text>
  <text x="785" y="330" fill="#ccccdd" font-size="10">localStorage persistence</text>
  <text x="785" y="346" fill="#ccccdd" font-size="10">3-letter initials input</text>
  <text x="785" y="362" fill="#ccccdd" font-size="10">Profanity filter (50+ words)</text>
  <text x="785" y="378" fill="#ccccdd" font-size="10">Top 20 leaderboard</text>
  <text x="785" y="394" fill="#ccccdd" font-size="10">Per-record high scores</text>

  <!-- Admin Dashboard -->
  <rect x="50" y="430" width="500" height="100" fill="#1a1a22" stroke="#888899" stroke-width="1.5" rx="6"/>
  <text x="300" y="450" fill="#888899" font-size="12" font-weight="bold" text-anchor="middle">Admin Dashboard (Canvas 2D)</text>
  <text x="65" y="472" fill="#ccccdd" font-size="10">Session-based login • Visual level editor • AI generation controls</text>
  <text x="65" y="488" fill="#ccccdd" font-size="10">Drag-to-place • Right-click delete • Property inspector • Validation</text>
  <text x="65" y="504" fill="#ccccdd" font-size="10">Seed / Difficulty / Density / Rotation sliders • JSON clipboard export</text>

  <!-- Mobile Support -->
  <rect x="570" y="430" width="220" height="100" fill="#1a1a22" stroke="#888899" stroke-width="1.5" rx="6"/>
  <text x="680" y="450" fill="#888899" font-size="12" font-weight="bold" text-anchor="middle">Mobile Support</text>
  <text x="585" y="472" fill="#ccccdd" font-size="10">Phaser Scale.FIT</text>
  <text x="585" y="488" fill="#ccccdd" font-size="10">Touch drag-to-spin</text>
  <text x="585" y="504" fill="#ccccdd" font-size="10">On-screen ◀ ▲ ▶ buttons</text>

  <!-- Social/SEO -->
  <rect x="810" y="430" width="180" height="100" fill="#1a1a22" stroke="#888899" stroke-width="1.5" rx="6"/>
  <text x="900" y="450" fill="#888899" font-size="12" font-weight="bold" text-anchor="middle">Social / SEO</text>
  <text x="825" y="472" fill="#ccccdd" font-size="10">Open Graph tags</text>
  <text x="825" y="488" fill="#ccccdd" font-size="10">Twitter Cards</text>
  <text x="825" y="504" fill="#ccccdd" font-size="10">SVG favicon</text>

  <!-- Arrows -->
  <line x1="370" y1="180" x2="400" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="270" x2="160" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="555" y1="270" x2="400" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="555" y1="270" x2="640" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="555" y1="270" x2="880" y2="290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Deployment -->
  <rect x="30" y="610" width="1040" height="100" fill="none" stroke="#333355" stroke-width="2" rx="8"/>
  <text x="50" y="635" fill="#666677" font-size="11">DEPLOYMENT</text>

  <rect x="50" y="645" width="180" height="50" fill="#222240" stroke="#44446a" rx="4"/>
  <text x="140" y="668" fill="#aaaacc" font-size="11" text-anchor="middle">GitHub</text>
  <text x="140" y="682" fill="#666677" font-size="9" text-anchor="middle">Source + Git push trigger</text>

  <line x1="230" y1="670" x2="280" y2="670" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="645" width="180" height="50" fill="#222240" stroke="#44446a" rx="4"/>
  <text x="370" y="668" fill="#aaaacc" font-size="11" text-anchor="middle">Vercel CI/CD</text>
  <text x="370" y="682" fill="#666677" font-size="9" text-anchor="middle">vite build → deploy</text>

  <line x1="460" y1="670" x2="510" y2="670" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="510" y="645" width="180" height="50" fill="#222240" stroke="#44446a" rx="4"/>
  <text x="600" y="668" fill="#aaaacc" font-size="11" text-anchor="middle">Vercel CDN</text>
  <text x="600" y="682" fill="#666677" font-size="9" text-anchor="middle">Static hosting • Edge</text>

  <line x1="690" y1="670" x2="740" y2="670" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="740" y="645" width="180" height="50" fill="#222240" stroke="#e94560" rx="4"/>
  <text x="830" y="668" fill="#e94560" font-size="11" text-anchor="middle">Players</text>
  <text x="830" y="682" fill="#666677" font-size="9" text-anchor="middle">Desktop + Mobile browsers</text>

  <!-- Arrow from client to deployment -->
  <line x1="550" y1="595" x2="550" y2="610" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="550" y="745" fill="#444455" font-size="10" text-anchor="middle">Zero static assets • Zero external APIs • ~15KB source code (excl. Phaser) • 34 procedurally generated levels</text>
  <text x="550" y="765" fill="#333344" font-size="9" text-anchor="middle">Phaser 3 • Vite 5 • Web Audio API • Canvas 2D • localStorage • Vercel • GitHub</text>
</svg>
